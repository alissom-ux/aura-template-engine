services:
  aura_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: aura-template-backend:${AURA_BACKEND_TAG:-latest}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.templatebuilder.rule=Host(`templatebuilder.appaura.com.br`)"
      - "traefik.http.routers.templatebuilder.entrypoints=websecure"
      - "traefik.http.routers.templatebuilder.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.templatebuilder.loadbalancer.server.port=3001"
      - "traefik.docker.network=root_default"

    environment:
      NODE_ENV: production
      AURA_RUNTIME_MODE: ${AURA_RUNTIME_MODE:-DEV}
      AURA_AI_MODE: ${AURA_AI_MODE:-openai}
      AURA_AI_TEMPERATURE: ${AURA_AI_TEMPERATURE:-0.3}
      AURA_AI_TIMEOUT_MS: ${AURA_AI_TIMEOUT_MS:-30000}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HOST: 0.0.0.0
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DIRECT_URL: ${DIRECT_URL:?DIRECT_URL is required}
      TEMPLATE_ENGINE_DEFAULT_TENANT_ID: ${TEMPLATE_ENGINE_DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v25.0}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_WABA_ID: ${META_WABA_ID:-}
    ports:
      - target: 3001
        published: ${AURA_BACKEND_PORT:-3011}
        protocol: tcp
        mode: ingress

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const port=process.env.PORT||3001; fetch('http://127.0.0.1:'+port+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      mode: replicated
      replicas: ${AURA_BACKEND_REPLICAS:-1}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        reservations:
          cpus: "0.25"
          memory: 256M
        limits:
          cpus: "1.00"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


