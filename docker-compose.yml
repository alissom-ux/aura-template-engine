version: "3.8"

services:
  aura_backend:
    image: aura-template-backend:1.0
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL:-postgresql://supabase_admin:PASSWORD@supabase_db:5432/postgres}
      TEMPLATE_ENGINE_DEFAULT_TENANT_ID: ${TEMPLATE_ENGINE_DEFAULT_TENANT_ID:-00000000-0000-0000-0000-000000000001}
    ports:
      - target: 3001
        published: ${AURA_BACKEND_PORT:-3001}
        protocol: tcp
        mode: ingress
    networks:
      - MaternaNet
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const port=process.env.PORT||3001; fetch('http://127.0.0.1:'+port+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      mode: replicated
      replicas: ${AURA_BACKEND_REPLICAS:-1}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      resources:
        reservations:
          cpus: "0.25"
          memory: 256M
        limits:
          cpus: "1.00"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  MaternaNet:
    external: true
    name: MaternaNet
